version: 2.1
jobs:
  build-and-test:
    docker:
      -image: cimg/python:3.10
    steps:
      - checkout
      
      - run:
          name: Install Project Libraries
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
      - run:
          name: Run Streamlit App(appnew.py)
          command: |
            .venv/bin/activate
            timeout 5 streamlit run appnew.py --server.headless true ||[[$? -eq 124 ]]
      - run:
          name: Run OFDM Module (ofdmnew.py)
          command: |
            .venv/bin/activate
            python ofdmnew.py

      - run:
          name: Run Neural Network (neuralnetwotknew.py)
          command: |
            .venv/bin/activate
            python neuralnetworknew.py
workflows:
  ofdm-ai-pipelines:
    jobs:
      - build-and-test

  